repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-merge-conflict
      - id: check-case-conflict
      - id: check-added-large-files
        args: ['--maxkb=1000']
      - id: mixed-line-ending
        args: ['--fix=lf']

  - repo: local
    hooks:
      - id: no-emojis
        name: Check for emojis
        entry: node scripts/scan-no-emoji.js
        language: system
        pass_filenames: false

      - id: lowercase-filenames
        name: Check lowercase filenames
        entry: node scripts/check-case.js
        language: system
        pass_filenames: false

      - id: validate-files
        name: Validate files
        entry: node scripts/validate-files.js
        language: system
        pass_filenames: false