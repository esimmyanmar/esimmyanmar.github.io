<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Page not found - eSIM Myanmar Entertainment Server">
    <meta name="robots" content="noindex, nofollow">
    <title>404 - Page Not Found | eSIM Myanmar</title>
    
    <style>
        body {
            font-family: 'Segoe UI Variable', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #1e2f3c;
            color: #ffffff;
            margin: 0;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .container {
            text-align: center;
            max-width: 600px;
            padding: 2rem;
        }
        .error-code {
            font-size: 6rem;
            font-weight: 700;
            color: #00ffff;
            margin-bottom: 1rem;
        }
        h1 {
            font-size: 2rem;
            font-weight: 600;
            margin-bottom: 1rem;
        }
        p {
            font-size: 1.125rem;
            color: rgba(255, 255, 255, 0.8);
            line-height: 1.6;
            margin-bottom: 2rem;
        }
        .btn {
            display: inline-block;
            padding: 1rem 2rem;
            background: linear-gradient(135deg, #00ffff 0%, rgba(0, 255, 255, 0.8) 100%);
            color: #1e2f3c;
            text-decoration: none;
            border-radius: 16px;
            font-weight: 600;
            margin: 0.5rem;
            transition: transform 0.3s ease;
        }
        .btn:hover {
            transform: translateY(-2px);
        }
        .btn-secondary {
            background: rgba(192, 192, 192, 0.3);
            color: #ffffff;
            border: 1px solid rgba(0, 255, 255, 0.2);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="error-code">404</div>
        <h1>Page Not Found</h1>
        <p>The page you're looking for doesn't exist or has been moved. Let's get you back to the entertainment hub.</p>
        <a href="/" class="btn">Go Home</a>
        <a href="/app" class="btn btn-secondary">Entertainment Hub</a>
    </div>
    
    <script>
        const path = window.location.pathname;
        if (path.startsWith('/app')) {
            window.location.href = '/app';
        }
    </script>
</body>
</html>
