name: Security and Compliance Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: '0 2 * * 1'

env:
  NODE_VERSION: '18'
  AUDIT_LEVEL: 'moderate'

jobs:
  security-scan:
    name: Security Vulnerability Scan
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'

    - name: Install dependencies
      run: npm ci --audit-level=${{ env.AUDIT_LEVEL }}

    - name: Run security audit
      run: |
        npm audit --audit-level=high --json > security-audit.json
        npm audit --audit-level=high

    - name: CodeQL Analysis
      uses: github/codeql-action/init@v3
      with:
        languages: javascript, typescript

    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v3

    - name: Upload security audit results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: security-audit-results
        path: security-audit.json
        retention-days: 30

  compliance-check:
    name: Compliance Verification
    runs-on: ubuntu-latest
    needs: security-scan
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Verify GSMA compliance
      run: |
        echo "Checking GSMA SGP.22 v4.0 compliance..."
        grep -r "SGP.22" . --include="*.md" --include="*.json" || exit 1
        echo "GSMA compliance verified"

    - name: Verify Myanmar PTD compliance
      run: |
        echo "Checking Myanmar Electronic Transactions Law 2021 compliance..."
        grep -r "Myanmar Electronic Transactions Law 2021" . --include="*.md" || exit 1
        echo "Myanmar PTD compliance verified"

    - name: Verify ISO 27001 compliance
      run: |
        echo "Checking ISO 27001 compliance..."
        grep -r "ISO 27001" . --include="*.md" || exit 1
        echo "ISO 27001 compliance verified"

    - name: License verification
      run: |
        if [ ! -f "LICENSE" ]; then
          echo "LICENSE file missing"
          exit 1
        fi
        echo "License file verified"

  build-test:
    name: Build and Test
    runs-on: ubuntu-latest
    needs: compliance-check
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Lint code
      run: npm run lint

    - name: Type check
      run: npx tsc --noEmit

    - name: Build application
      run: npm run build
      env:
        NEXT_PUBLIC_MICROSOFT_CLIENT_ID: ${{ secrets.MICROSOFT_CLIENT_ID }}
        NEXT_PUBLIC_MICROSOFT_TENANT_ID: ${{ secrets.MICROSOFT_TENANT_ID }}
        NEXT_PUBLIC_SHAREPOINT_SITE: ${{ secrets.SHAREPOINT_SITE }}
        NEXT_PUBLIC_DATAVERSE_URL: ${{ secrets.DATAVERSE_URL }}
        NEXT_PUBLIC_COPILOT_BOT_ID: ${{ secrets.COPILOT_BOT_ID }}
        NEXT_PUBLIC_POWER_BI_WORKSPACE: ${{ secrets.POWER_BI_WORKSPACE }}

    - name: Run tests
      run: npm test
      if: success()

    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: build-output
        path: out/
        retention-days: 7

  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: build-test
    if: github.ref == 'refs/heads/develop'
    environment: staging
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Download build artifacts
      uses: actions/download-artifact@v4
      with:
        name: build-output
        path: out/

    - name: Deploy to Azure Static Web Apps (Staging)
      uses: Azure/static-web-apps-deploy@v1
      with:
        azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_STAGING }}
        repo_token: ${{ secrets.GITHUB_TOKEN }}
        action: "upload"
        app_location: "/"
        output_location: "out"

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: build-test
    if: github.ref == 'refs/heads/main'
    environment: production
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Download build artifacts
      uses: actions/download-artifact@v4
      with:
        name: build-output
        path: out/

    - name: Deploy to Azure Static Web Apps (Production)
      uses: Azure/static-web-apps-deploy@v1
      with:
        azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
        repo_token: ${{ secrets.GITHUB_TOKEN }}
        action: "upload"
        app_location: "/"
        output_location: "out"

    - name: Create deployment log
      run: |
        echo "Deployment completed at $(date -u +%Y-%m-%dT%H:%M:%SZ)" >> deployment.log
        echo "Commit: ${{ github.sha }}" >> deployment.log
        echo "Author: ${{ github.actor }}" >> deployment.log

    - name: Upload deployment log
      uses: actions/upload-artifact@v4
      with:
        name: deployment-log
        path: deployment.log
        retention-days: 365