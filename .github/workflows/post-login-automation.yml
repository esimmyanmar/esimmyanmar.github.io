name: eSIM Myanmar Post-Login Automation

on:
  workflow_dispatch:
    inputs:
      subscription_id:
        description: 'Azure Subscription ID'
        required: true
        type: string
      resource_group_name:
        description: 'Resource Group Name'
        required: false
        default: 'rg-esim-myanmar-prod'
        type: string
      location:
        description: 'Azure Region'
        required: false
        default: 'Southeast Asia'
        type: string
      run_compliance_check:
        description: 'Run Device Compliance Check'
        required: false
        default: true
        type: boolean

env:
  AZURE_SUBSCRIPTION_ID: ${{ github.event.inputs.subscription_id }}
  AZURE_RESOURCE_GROUP: ${{ github.event.inputs.resource_group_name }}
  AZURE_LOCATION: ${{ github.event.inputs.location }}

jobs:
  security-scan:
    name: Security and Compliance Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      
      - name: Run CodeQL Analysis
        uses: github/codeql-action/init@v3
        with:
          languages: javascript, python, csharp
      
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
      
      - name: Run Dependency Check
        uses: dependency-check/Dependency-Check_Action@main
        with:
          project: 'eSIM Myanmar'
          path: '.'
          format: 'ALL'
      
      - name: Upload Dependency Check Results
        uses: actions/upload-artifact@v4
        with:
          name: dependency-check-report
          path: reports/

  azure-provisioning:
    name: Azure Infrastructure Provisioning
    runs-on: windows-latest
    needs: security-scan
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      
      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
      
      - name: Install Required PowerShell Modules
        shell: pwsh
        run: |
          Install-Module -Name Az -Force -AllowClobber -Scope CurrentUser
          Install-Module -Name Microsoft.Graph -Force -AllowClobber -Scope CurrentUser
          Install-Module -Name MicrosoftPowerBIMgmt -Force -AllowClobber -Scope CurrentUser
      
      - name: Run Post-Login Automation Script
        shell: pwsh
        run: |
          ./scripts/post-login-automation.ps1 -SubscriptionId "${{ env.AZURE_SUBSCRIPTION_ID }}" -ResourceGroupName "${{ env.AZURE_RESOURCE_GROUP }}" -Location "${{ env.AZURE_LOCATION }}"
        env:
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
      
      - name: Upload Automation Logs
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: automation-logs
          path: '*.log'

  device-compliance:
    name: Device Compliance Validation
    runs-on: ${{ matrix.os }}
    if: ${{ github.event.inputs.run_compliance_check == 'true' }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install azure-identity azure-monitor-ingestion azure-keyvault-secrets msal requests
      
      - name: Run Device Compliance Check
        run: |
          python scripts/device-compliance-monitor.py
        env:
          MICROSOFT_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          MICROSOFT_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          MICROSOFT_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          AZURE_KEY_VAULT_URL: ${{ secrets.AZURE_KEY_VAULT_URL }}
          LOG_ANALYTICS_ENDPOINT: ${{ secrets.LOG_ANALYTICS_ENDPOINT }}
          LOG_ANALYTICS_RULE_ID: ${{ secrets.LOG_ANALYTICS_RULE_ID }}
      
      - name: Upload Compliance Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: compliance-results-${{ matrix.os }}
          path: |
            compliance-result-*.json
            device-compliance-*.log

  power-bi-deployment:
    name: Power BI Dashboard Deployment
    runs-on: ubuntu-latest
    needs: azure-provisioning
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install Power BI CLI
        run: |
          npm install -g @microsoft/powerbi-cli
      
      - name: Deploy Power BI Dashboards
        run: |
          # Configure Power BI dashboards from JSON configuration
          node scripts/deploy-powerbi-dashboards.js
        env:
          POWERBI_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          POWERBI_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          POWERBI_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}

  static-web-app-deployment:
    name: Azure Static Web App Deployment
    runs-on: ubuntu-latest
    needs: [azure-provisioning, power-bi-deployment]
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install Dependencies
        run: npm ci
      
      - name: Build Application
        run: npm run build
        env:
          NEXT_PUBLIC_MICROSOFT_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          NEXT_PUBLIC_MICROSOFT_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          NEXT_PUBLIC_SHAREPOINT_SITE: ${{ secrets.SHAREPOINT_SITE_URL }}
          NEXT_PUBLIC_DATAVERSE_URL: ${{ secrets.DATAVERSE_URL }}
          NEXT_PUBLIC_COPILOT_BOT_ID: ${{ secrets.COPILOT_BOT_ID }}
          NEXT_PUBLIC_POWER_BI_WORKSPACE: ${{ secrets.POWER_BI_WORKSPACE_ID }}
      
      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: 'upload'
          app_location: '/'
          api_location: 'api'
          output_location: 'out'

  monitoring-setup:
    name: Monitoring and Alerting Setup
    runs-on: ubuntu-latest
    needs: static-web-app-deployment
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      
      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
      
      - name: Setup Application Insights
        run: |
          az monitor app-insights component create \
            --app esim-myanmar-prod \
            --location "${{ env.AZURE_LOCATION }}" \
            --resource-group "${{ env.AZURE_RESOURCE_GROUP }}" \
            --workspace "/subscriptions/${{ env.AZURE_SUBSCRIPTION_ID }}/resourceGroups/${{ env.AZURE_RESOURCE_GROUP }}/providers/Microsoft.OperationalInsights/workspaces/law-esim-myanmar-prod"
      
      - name: Configure Alert Rules
        run: |
          # Create metric alert for high response time
          az monitor metrics alert create \
            --name "High Response Time" \
            --resource-group "${{ env.AZURE_RESOURCE_GROUP }}" \
            --scopes "/subscriptions/${{ env.AZURE_SUBSCRIPTION_ID }}/resourceGroups/${{ env.AZURE_RESOURCE_GROUP }}/providers/Microsoft.Insights/components/esim-myanmar-prod" \
            --condition "avg requests/duration > 5000" \
            --description "Alert when average response time exceeds 5 seconds" \
            --evaluation-frequency 1m \
            --window-size 5m \
            --severity 2
          
          # Create availability alert
          az monitor metrics alert create \
            --name "Low Availability" \
            --resource-group "${{ env.AZURE_RESOURCE_GROUP }}" \
            --scopes "/subscriptions/${{ env.AZURE_SUBSCRIPTION_ID }}/resourceGroups/${{ env.AZURE_RESOURCE_GROUP }}/providers/Microsoft.Insights/components/esim-myanmar-prod" \
            --condition "avg availabilityResults/availabilityPercentage < 99" \
            --description "Alert when availability drops below 99%" \
            --evaluation-frequency 1m \
            --window-size 5m \
            --severity 1

  audit-logging:
    name: Immutable Audit Logging
    runs-on: ubuntu-latest
    needs: [azure-provisioning, device-compliance, static-web-app-deployment, monitoring-setup]
    if: always()
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      
      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
      
      - name: Generate Deployment Audit Log
        run: |
          # Create comprehensive audit log
          cat > deployment-audit.json << EOF
          {
            "timestamp": "$(date -u +%Y-%m-%dT%H:%M:%S.%3NZ)",
            "event": "PostLoginAutomationWorkflow",
            "workflow_id": "${{ github.run_id }}",
            "workflow_number": "${{ github.run_number }}",
            "repository": "${{ github.repository }}",
            "ref": "${{ github.ref }}",
            "sha": "${{ github.sha }}",
            "actor": "${{ github.actor }}",
            "subscription_id": "${{ env.AZURE_SUBSCRIPTION_ID }}",
            "resource_group": "${{ env.AZURE_RESOURCE_GROUP }}",
            "location": "${{ env.AZURE_LOCATION }}",
            "jobs": {
              "security_scan": "${{ needs.security-scan.result }}",
              "azure_provisioning": "${{ needs.azure-provisioning.result }}",
              "device_compliance": "${{ needs.device-compliance.result }}",
              "power_bi_deployment": "${{ needs.power-bi-deployment.result }}",
              "static_web_app_deployment": "${{ needs.static-web-app-deployment.result }}",
              "monitoring_setup": "${{ needs.monitoring-setup.result }}"
            },
            "compliance": {
              "gsma": "SGP.22 v4.0 Compliant",
              "myanmar_ptd": "Electronic Transactions Law 2021 Compliant",
              "iso27001": "Information Security Management Compliant",
              "gdpr": "Data Protection Regulation Compliant"
            },
            "security": {
              "zero_trust": "Enabled",
              "conditional_access": "Configured",
              "mfa": "Required",
              "device_compliance": "Enforced"
            },
            "status": "Completed"
          }
          EOF
      
      - name: Send Audit Log to Azure Monitor
        run: |
          # Get Log Analytics workspace details
          WORKSPACE_ID=$(az monitor log-analytics workspace show \
            --resource-group "${{ env.AZURE_RESOURCE_GROUP }}" \
            --workspace-name "law-esim-myanmar-prod" \
            --query "customerId" -o tsv)
          
          WORKSPACE_KEY=$(az monitor log-analytics workspace get-shared-keys \
            --resource-group "${{ env.AZURE_RESOURCE_GROUP }}" \
            --workspace-name "law-esim-myanmar-prod" \
            --query "primarySharedKey" -o tsv)
          
          # Send audit log using REST API
          python3 << EOF
          import json
          import requests
          import hmac
          import hashlib
          import base64
          from datetime import datetime
          
          # Read audit log
          with open('deployment-audit.json', 'r') as f:
              audit_data = json.load(f)
          
          # Log Analytics configuration
          workspace_id = "$WORKSPACE_ID"
          workspace_key = "$WORKSPACE_KEY"
          log_type = "eSIMDeploymentAudit"
          
          # Prepare request
          method = 'POST'
          content_type = 'application/json'
          resource = '/api/logs'
          rfc1123date = datetime.utcnow().strftime('%a, %d %b %Y %H:%M:%S GMT')
          content_length = len(json.dumps(audit_data))
          
          # Build signature
          string_to_hash = f"{method}\n{content_length}\n{content_type}\nx-ms-date:{rfc1123date}\n{resource}"
          bytes_to_hash = bytes(string_to_hash, 'UTF-8')
          decoded_key = base64.b64decode(workspace_key)
          encoded_hash = base64.b64encode(hmac.new(decoded_key, bytes_to_hash, digestmod=hashlib.sha256).digest()).decode()
          authorization = f"SharedKey {workspace_id}:{encoded_hash}"
          
          # Send request
          uri = f"https://{workspace_id}.ods.opinsights.azure.com{resource}?api-version=2016-04-01"
          headers = {
              'Authorization': authorization,
              'Log-Type': log_type,
              'x-ms-date': rfc1123date,
              'time-generated-field': 'timestamp'
          }
          
          response = requests.post(uri, data=json.dumps([audit_data]), headers=headers)
          print(f"Audit log sent to Azure Monitor: {response.status_code}")
          EOF
      
      - name: Upload Audit Log
        uses: actions/upload-artifact@v4
        with:
          name: deployment-audit-log
          path: deployment-audit.json

  notification:
    name: Deployment Notification
    runs-on: ubuntu-latest
    needs: [audit-logging]
    if: always()
    steps:
      - name: Send Teams Notification
        uses: skitionek/notify-microsoft-teams@master
        if: always()
        with:
          webhook_url: ${{ secrets.TEAMS_WEBHOOK_URL }}
          overwrite: "{title: `eSIM Myanmar Deployment ${github.run_number}`, themeColor: '${{ job.status == 'success' && '00ff00' || 'ff0000' }}', sections: [{activityTitle: 'Deployment Status', activitySubtitle: '${{ job.status }}', facts: [{name: 'Repository', value: '${{ github.repository }}'}, {name: 'Branch', value: '${{ github.ref }}'}, {name: 'Commit', value: '${{ github.sha }}'}, {name: 'Actor', value: '${{ github.actor }}'}]}]}"
      
      - name: Send Email Notification
        uses: dawidd6/action-send-mail@v3
        if: always()
        with:
          server_address: smtp.office365.com
          server_port: 587
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: "eSIM Myanmar Deployment ${{ job.status == 'success' && 'Successful' || 'Failed' }} - Run #${{ github.run_number }}"
          to: info@esim.com.mm
          from: noreply@esim.com.mm
          body: |
            eSIM Myanmar automated deployment has completed with status: ${{ job.status }}
            
            Deployment Details:
            - Repository: ${{ github.repository }}
            - Branch: ${{ github.ref }}
            - Commit: ${{ github.sha }}
            - Actor: ${{ github.actor }}
            - Run ID: ${{ github.run_id }}
            
            Job Results:
            - Security Scan: ${{ needs.security-scan.result }}
            - Azure Provisioning: ${{ needs.azure-provisioning.result }}
            - Device Compliance: ${{ needs.device-compliance.result }}
            - Power BI Deployment: ${{ needs.power-bi-deployment.result }}
            - Static Web App: ${{ needs.static-web-app-deployment.result }}
            - Monitoring Setup: ${{ needs.monitoring-setup.result }}
            - Audit Logging: ${{ needs.audit-logging.result }}
            
            For more details, visit: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
            
            Contact: info@esim.com.mm | 09650000172