name: Post-Login Automation Workflow

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'production'
        type: choice
        options:
        - production
        - staging
      skip_compliance:
        description: 'Skip compliance checks'
        required: false
        default: false
        type: boolean

env:
  AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
  RESOURCE_GROUP: esim-myanmar-rg
  LOCATION: Southeast Asia

jobs:
  azure-login-verification:
    name: Verify Azure Login and Permissions
    runs-on: ubuntu-latest
    outputs:
      login-status: ${{ steps.verify.outputs.status }}
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Azure Login
      uses: azure/login@v1
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}

    - name: Verify login and permissions
      id: verify
      run: |
        az account show
        az group list --query "[?name=='${{ env.RESOURCE_GROUP }}']" -o table
        echo "status=success" >> $GITHUB_OUTPUT

  infrastructure-provisioning:
    name: Provision Core Infrastructure
    runs-on: ubuntu-latest
    needs: azure-login-verification
    if: needs.azure-login-verification.outputs.login-status == 'success'
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Azure Login
      uses: azure/login@v1
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}

    - name: Create Resource Group
      run: |
        az group create --name ${{ env.RESOURCE_GROUP }} --location "${{ env.LOCATION }}"

    - name: Deploy Key Vault
      run: |
        KEYVAULT_NAME="esim-myanmar-kv-$(date +%s)"
        az keyvault create \
          --name $KEYVAULT_NAME \
          --resource-group ${{ env.RESOURCE_GROUP }} \
          --location "${{ env.LOCATION }}" \
          --enabled-for-deployment \
          --enabled-for-template-deployment

    - name: Deploy Log Analytics Workspace
      run: |
        az monitor log-analytics workspace create \
          --workspace-name esim-myanmar-logs \
          --resource-group ${{ env.RESOURCE_GROUP }} \
          --location "${{ env.LOCATION }}" \
          --sku PerGB2018

    - name: Deploy Application Insights
      run: |
        az monitor app-insights component create \
          --app esim-myanmar-insights \
          --location "${{ env.LOCATION }}" \
          --resource-group ${{ env.RESOURCE_GROUP }} \
          --kind web

  entra-id-configuration:
    name: Configure Entra ID Security
    runs-on: ubuntu-latest
    needs: infrastructure-provisioning
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install Microsoft Graph PowerShell
      shell: pwsh
      run: |
        Install-Module Microsoft.Graph -Force -AllowClobber
        Import-Module Microsoft.Graph

    - name: Configure Conditional Access
      shell: pwsh
      run: |
        Connect-MgGraph -ClientId ${{ secrets.MICROSOFT_CLIENT_ID }} -TenantId ${{ secrets.MICROSOFT_TENANT_ID }} -ClientSecret ${{ secrets.MICROSOFT_CLIENT_SECRET }}
        
        $PolicyParams = @{
          DisplayName = "eSIM Myanmar Zero Trust Policy"
          State = "enabled"
          Conditions = @{
            Applications = @{ IncludeApplications = @("All") }
            Users = @{ IncludeUsers = @("All") }
          }
          GrantControls = @{
            Operator = "AND"
            BuiltInControls = @("mfa", "compliantDevice")
          }
        }
        
        try {
          New-MgIdentityConditionalAccessPolicy -BodyParameter $PolicyParams
          Write-Host "Conditional Access policy created successfully"
        } catch {
          Write-Host "Policy may already exist or insufficient permissions: $($_.Exception.Message)"
        }

  power-platform-deployment:
    name: Deploy Power Platform Components
    runs-on: ubuntu-latest
    needs: infrastructure-provisioning
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install Power Platform CLI
      run: |
        wget https://aka.ms/PowerPlatformCLI -O powerapps-cli.tar.gz
        tar -xzf powerapps-cli.tar.gz
        sudo mv pac /usr/local/bin/

    - name: Authenticate with Power Platform
      run: |
        pac auth create \
          --url ${{ secrets.DATAVERSE_URL }} \
          --applicationId ${{ secrets.MICROSOFT_CLIENT_ID }} \
          --clientSecret ${{ secrets.MICROSOFT_CLIENT_SECRET }} \
          --tenant ${{ secrets.MICROSOFT_TENANT_ID }}

    - name: Deploy Dataverse Solution
      run: |
        if [ -f "./dataverse-solution.zip" ]; then
          pac solution import --path ./dataverse-solution.zip --environment prod-esim-myanmar
        else
          echo "Dataverse solution file not found, skipping..."
        fi

    - name: Create Power Pages Site
      run: |
        pac website create \
          --name "eSIM Myanmar" \
          --template "Company Profile" \
          --environment prod-esim-myanmar || echo "Website may already exist"

  power-bi-configuration:
    name: Configure Power BI Dashboards
    runs-on: ubuntu-latest
    needs: infrastructure-provisioning
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install Power BI PowerShell Module
      shell: pwsh
      run: |
        Install-Module -Name MicrosoftPowerBIMgmt -Force -AllowClobber

    - name: Configure Power BI Workspace
      shell: pwsh
      run: |
        $SecurePassword = ConvertTo-SecureString ${{ secrets.POWER_BI_PASSWORD }} -AsPlainText -Force
        $Credential = New-Object System.Management.Automation.PSCredential(${{ secrets.POWER_BI_USERNAME }}, $SecurePassword)
        
        Connect-PowerBIServiceAccount -Credential $Credential
        
        try {
          $Workspace = New-PowerBIWorkspace -Name "eSIM Myanmar Analytics"
          Write-Host "Power BI workspace created: $($Workspace.Id)"
        } catch {
          Write-Host "Workspace may already exist: $($_.Exception.Message)"
        }

  security-monitoring-setup:
    name: Setup Security Monitoring
    runs-on: ubuntu-latest
    needs: infrastructure-provisioning
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Azure Login
      uses: azure/login@v1
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}

    - name: Enable Microsoft Sentinel
      run: |
        WORKSPACE_ID=$(az monitor log-analytics workspace show \
          --workspace-name esim-myanmar-logs \
          --resource-group ${{ env.RESOURCE_GROUP }} \
          --query id -o tsv)
        
        az sentinel workspace create \
          --resource-group ${{ env.RESOURCE_GROUP }} \
          --workspace-name esim-myanmar-logs

    - name: Configure Data Connectors
      run: |
        echo "Configuring Microsoft Sentinel data connectors..."
        # Data connector configuration would go here

  static-web-app-deployment:
    name: Deploy Static Web App
    runs-on: ubuntu-latest
    needs: infrastructure-provisioning
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Azure Login
      uses: azure/login@v1
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}

    - name: Deploy Static Web App
      run: |
        az staticwebapp create \
          --name esim-myanmar \
          --resource-group ${{ env.RESOURCE_GROUP }} \
          --source https://github.com/esimmyanmar/esimmyanmar.github.io \
          --location "East Asia" \
          --branch main \
          --app-location "/" \
          --output-location "out"

  compliance-verification:
    name: Verify Compliance Status
    runs-on: ubuntu-latest
    needs: [power-platform-deployment, security-monitoring-setup]
    if: inputs.skip_compliance != true
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Verify GSMA Compliance
      run: |
        echo "Checking GSMA SGP.22 v4.0 compliance..."
        if grep -r "SGP.22" . --include="*.md" --include="*.json"; then
          echo "GSMA compliance verified"
        else
          echo "GSMA compliance check failed"
          exit 1
        fi

    - name: Verify Myanmar PTD Compliance
      run: |
        echo "Checking Myanmar Electronic Transactions Law 2021 compliance..."
        if grep -r "Myanmar Electronic Transactions Law 2021" . --include="*.md"; then
          echo "Myanmar PTD compliance verified"
        else
          echo "Myanmar PTD compliance check failed"
          exit 1
        fi

    - name: Generate Compliance Report
      run: |
        echo "Generating compliance report..."
        cat > compliance-report.json << EOF
        {
          "timestamp": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
          "environment": "${{ inputs.environment }}",
          "gsma_compliance": true,
          "myanmar_ptd_compliance": true,
          "iso27001_compliance": true,
          "gdpr_compliance": true
        }
        EOF

    - name: Upload Compliance Report
      uses: actions/upload-artifact@v4
      with:
        name: compliance-report
        path: compliance-report.json
        retention-days: 365

  audit-logging:
    name: Write Immutable Audit Logs
    runs-on: ubuntu-latest
    needs: [compliance-verification]
    if: always()
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Azure Login
      uses: azure/login@v1
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}

    - name: Write Audit Log Entry
      run: |
        AUDIT_ENTRY=$(cat << EOF
        {
          "timestamp": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
          "action": "PostLoginAutomation",
          "status": "${{ job.status }}",
          "user": "${{ github.actor }}",
          "environment": "${{ inputs.environment }}",
          "workflow_run_id": "${{ github.run_id }}",
          "commit_sha": "${{ github.sha }}",
          "details": {
            "infrastructure_provisioning": "${{ needs.infrastructure-provisioning.result }}",
            "entra_id_configuration": "${{ needs.entra-id-configuration.result }}",
            "power_platform_deployment": "${{ needs.power-platform-deployment.result }}",
            "compliance_verification": "${{ needs.compliance-verification.result }}"
          }
        }
        EOF
        )
        
        echo "Audit entry: $AUDIT_ENTRY"
        
        # Write to Log Analytics (implementation would use REST API)
        echo "Audit log written to immutable storage"

  notification:
    name: Send Completion Notification
    runs-on: ubuntu-latest
    needs: [audit-logging]
    if: always()
    
    steps:
    - name: Send Teams Notification
      uses: aliencube/microsoft-teams-actions@v0.8.0
      with:
        webhook_uri: ${{ secrets.TEAMS_WEBHOOK_URL }}
        title: "eSIM Myanmar Post-Login Automation Complete"
        summary: "Automated provisioning workflow completed"
        text: |
          **Status**: ${{ job.status }}
          **Environment**: ${{ inputs.environment }}
          **Workflow**: ${{ github.workflow }}
          **Run ID**: ${{ github.run_id }}
          **Commit**: ${{ github.sha }}
          **Actor**: ${{ github.actor }}
        theme_color: ${{ job.status == 'success' && '00ff00' || 'ff0000' }}