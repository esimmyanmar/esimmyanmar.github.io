name: Deploy eSIM Myanmar Website

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  audit-and-test:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci
      
    - name: Run security audit
      run: npm audit --audit-level moderate
      continue-on-error: true
      
    - name: Run ESLint
      run: npm run lint
      
    - name: Run Stylelint
      run: npm run lint:css
      
    - name: Type check
      run: npm run type-check
      
    - name: Build application
      run: npm run build
      
    - name: Install Playwright browsers
      run: npx playwright install --with-deps
      
    - name: Run Playwright tests
      run: npm run test
      
    - name: Upload Playwright report
      uses: actions/upload-artifact@v4
      if: failure()
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 30

  lighthouse-audit:
    runs-on: ubuntu-latest
    needs: audit-and-test
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci
      
    - name: Build application
      run: npm run build
      
    - name: Run Lighthouse CI
      run: npm run lighthouse-ci
      env:
        LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}

  security-scan:
    runs-on: ubuntu-latest
    needs: audit-and-test
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Run OWASP ZAP Baseline Scan
      uses: zaproxy/action-baseline@v0.10.0
      with:
        target: 'https://esimmyanmar.github.io'
        rules_file_name: '.zap/rules.tsv'
        cmd_options: '-a'

  deploy:
    runs-on: ubuntu-latest
    needs: [audit-and-test, lighthouse-audit]
    if: github.ref == 'refs/heads/main'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci
      
    - name: Build application
      run: npm run build
      
    - name: Deploy to GitHub Pages
      uses: peaceiris/actions-gh-pages@v3
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./out
        cname: esim.com.mm
        
    - name: Sync to AWS S3 (Backup)
      if: success()
      run: |
        aws s3 sync ./out s3://esim-myanmar-backup --delete
      env:
        AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
        AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        AWS_DEFAULT_REGION: ap-southeast-1

  post-deploy-verification:
    runs-on: ubuntu-latest
    needs: deploy
    if: github.ref == 'refs/heads/main'
    
    steps:
    - name: Wait for deployment
      run: sleep 60
      
    - name: Verify deployment
      run: |
        curl -f https://esimmyanmar.github.io/en || exit 1
        curl -f https://esimmyanmar.github.io/en/partners || exit 1
        curl -f https://esimmyanmar.github.io/my || exit 1
        
    - name: Check partner links
      run: |
        curl -f https://atom.com.mm || echo "ATOM link check failed"
        curl -f https://uab.com.mm || echo "UAB link check failed"
        curl -f https://wavemoney.com.mm || echo "WavePay link check failed"
        curl -f https://myanmarpay.com.mm || echo "MMQR link check failed"
        
    - name: Final Lighthouse audit
      run: |
        npx lighthouse https://esimmyanmar.github.io/en --output=json --output-path=./lighthouse-final.json
        cat ./lighthouse-final.json | jq '.categories.performance.score, .categories.accessibility.score, .categories."best-practices".score, .categories.seo.score'